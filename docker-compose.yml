services:
  # Builds and runs all C++ unit tests
  unit-tests:
    build:
      context: .
      dockerfile: Dockerfile
      target: test
    image: rssani-tests

  # Integration tests: starts rssani binary and tests gRPC interface
  integration-tests:
    build:
      context: .
      dockerfile: Dockerfile.integration
    depends_on:
      - unit-tests
    image: rssani-grpc-tests
    network_mode: host

  # Release build: minimal image with only the rssani binary
  release:
    build:
      context: .
      dockerfile: Dockerfile
      target: release
    image: rssani-release
    ports:
      - "50051:50051"
