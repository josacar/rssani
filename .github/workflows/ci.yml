name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    container: alpine:latest

    steps:
      - name: Install dependencies
        run: |
          export LC_ALL=C.UTF-8
          apk add --no-cache \
            build-base \
            cmake \
            git \
            pkgconfig \
            ca-certificates \
            qt6-qtbase-dev \
            qt6-qttools-dev \
            grpc-dev \
            protobuf-dev \
            protoc

      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure
        run: |
          mkdir -p build
          cd build
          cmake ..

      - name: Build
        run: |
          cd build
          make -j$(nproc)

      - name: Run unit tests
        run: |
          cd build
          ./rssani_tests_values && \
          ./rssani_tests_mail && \
          ./rssani_tests_rss && \
          ./rssani_tests_rssani && \
          ./rssani_tests_irc

      - name: Run CTest
        run: |
          ctest --test-dir build --output-on-failure
